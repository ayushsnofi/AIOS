services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aios-postgres
    environment:
      POSTGRES_DB: ai_os
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: aios_dev_password
    ports:
      - "5432:5432"
    volumes:
      - aios_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aios -d ai_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aios-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - aios_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aios_postgres_data:
  aios_redis_data:
