# =============================================================================
# AIOS Backend — Base Configuration (all profiles)
# =============================================================================
# Profile-specific overrides:
#   local  → application-local.yml  (default, Docker Compose on localhost)
#   dev    → application-dev.yml    (shared development environment)
#   prod   → application-prod.yml   (production hardened)
#
# Activate: SPRING_PROFILES_ACTIVE=local|dev|prod
# Secrets:  see /.env.example — never commit real values
# =============================================================================

spring:
  application:
    name: aios-backend

  profiles:
    default: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: ${AIOS_EMBEDDING_DIMENSIONS:1536}
        max-document-batch-size: 1000
        initialize-schema: false
        vector-table-name: memories
        schema-name: public

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

jwt:
  secret: ${JWT_SECRET:changeme-use-a-long-secret-at-least-32-chars}
  expiration: ${JWT_EXPIRATION:86400000}

aios:
  security:
    api-key-header: X-API-Key
    placeholder-api-key: ${AIOS_API_KEY:changeme}
  ai:
    default-model: phi4
    fallback-model: qwen3
    max-retries: 2
    retry-delay-ms: 500
  memory:
    embedding-model: ${AIOS_EMBEDDING_MODEL:nomic-embed-text}
    embedding-dimensions: ${AIOS_EMBEDDING_DIMENSIONS:1536}
    retrieval-limit: 5
    min-trust-score: 0.5
    semantic-cache-max-distance: 0.05
    semantic-cache-max-entries: 100
    semantic-cache-ttl-seconds: 3600
    vector-store-enabled: true

logging:
  level:
    root: INFO
    com.aios: INFO
    org.springframework.security: INFO
