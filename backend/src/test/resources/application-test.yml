spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
  datasource:
    url: jdbc:h2:mem:aios_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  ai:
    openai:
      api-key: test-key
      base-url: http://localhost:4000

jwt:
  secret: test-jwt-secret-at-least-32-characters-long
  expiration: 86400000

aios:
  security:
    placeholder-api-key: test-api-key
  memory:
    vector-store-enabled: false
